        .contact-item a { color: var(--secondary-blue); text-decoration: none; transition: 0.3s; }
        .contact-item a:hover { color: var(--primary-gold); }
        .divider { width: 60px; height: 2px; background: var(--primary-gold); margin: 30px auto; }
        footer { background: var(--secondary-blue); color: white; padding: 50px 10%; text-align: center; }
